name: QA Checks

on:
  pull_request:
    branches: [main]

jobs:
  vale:
    runs-on: ubuntu-latest
    env:
      VALE_VERSION: "3.14.2"
    steps:
      - uses: actions/checkout@v4

      - name: Install Vale
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/vale-cli/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | tar xz -C /usr/local/bin vale

      - name: Run Vale
        run: git ls-files docs/ | grep -E '\.(md|csv)$' | xargs vale

  dropdowns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check empty dropdowns
        run: python3 scripts/check-dropdowns.py

  file-placement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check file placement
        run: python3 scripts/check-file-placement.py

  toc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Check TOC
        run: python3 scripts/check-toc.py
