# This file was created automatically with `myst init --gh-pages` 🪄 💚
# Ensure your GitHub Pages settings for this repository are set to deploy with **GitHub Actions**.

name: MyST GitHub Pages Deploy
on:
  push:
    # Runs on pushes targeting the default branch
    branches: [main]
env:
  # `BASE_URL` determines, relative to the root of the domain, the URL that your site is served from.
  # E.g., if your site lives at `https://mydomain.org/myproject`, set `BASE_URL=/myproject`.
  # If, instead, your site lives at the root of the domain, at `https://mydomain.org`, set `BASE_URL=''`.
  BASE_URL: ""

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: 'pages'
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install MyST
        run: npm install -g mystmd
      - name: Install typst
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz" | tar -xJ -C /tmp
          sudo install /tmp/typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          typst --version
      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-core
      - name: Generate lab-ready protocol PDFs and BOMs
        # Must run before `myst build` so the download buttons resolve the
        # generated PDFs/CSVs (see scripts/build-protocols.py, issue #10).
        run: python3 scripts/build-protocols.py
      - name: Generate distribution-wide materials reference
        # Must run before `myst build` so guides/materials-reference.md can
        # include the generated table partial (see scripts/build-materials-reference.py, #108).
        run: python3 scripts/build-materials-reference.py
      - name: Build HTML Assets
        run: myst build --html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
