name: Vale Lint

on:
  pull_request:
    branches: [main]

jobs:
  vale:
    runs-on: ubuntu-latest
    env:
      VALE_VERSION: "3.14.2"
    steps:
      - uses: actions/checkout@v4

      - name: Install Vale
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/vale-cli/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | tar xz -C /usr/local/bin vale

      - name: Run Vale
        run: vale docs/
