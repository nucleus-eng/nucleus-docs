name: Formatting Checks

on:
  pull_request:
    branches: [main]

jobs:
  hard-wraps:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check prose hard-wraps (warning-only)
        run: python3 scripts/check-formatting.py docs/
