name: Spell Check

on:
  pull_request:
    branches: [main]

jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install codespell
        run: pip install codespell

      - name: Run codespell
        run: codespell docs/
